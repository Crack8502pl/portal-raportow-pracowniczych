version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: portal_postgres
    environment:
      POSTGRES_DB: portal_reports
      POSTGRES_USER: portal_user
      POSTGRES_PASSWORD: secure_db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database:/docker-entrypoint-initdb.d/
    ports:
      - "5432:5432"
    networks:
      - portal_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal_user -d portal_reports"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Application Server
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: portal_app
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: portal_reports
      DB_USER: portal_user
      DB_PASSWORD: secure_db_password
      
      # JWT
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 7d
      
      # SMTP (configure with your email provider)
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_SECURE: false
      SMTP_USER: your-email@gmail.com
      SMTP_PASSWORD: your-app-password
      EMAIL_FROM: reports@company.com
      EMAIL_RECIPIENTS: manager@company.com,admin@company.com
      
      # File Upload
      MAX_FILE_SIZE: 5242880
      ALLOWED_EXTENSIONS: jpg,jpeg,png,pdf,doc,docx,xls,xlsx
      UPLOAD_PATH: ./uploads
      
      # Security
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      
      # Features
      ENABLE_REGISTRATION: false
      ENABLE_EMAIL_NOTIFICATIONS: true
      TEXT_FIELD_MAX_LENGTH: 300
      
    volumes:
      - uploads_data:/app/uploads
      - exports_data:/app/exports
    ports:
      - "3000:3000"
    networks:
      - portal_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: portal_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - portal_network
    depends_on:
      - app
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  exports_data:
    driver: local

networks:
  portal_network:
    driver: bridge