# Portal Raportów Pracowniczych - Root Docker Compose
# Run with: docker compose up -d
# For production with Nginx: docker compose --profile production up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: portal_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-portal_reports}
      POSTGRES_USER: ${DB_USER:-portal_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_db_password_$(date +%s)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d/
      - ./data/json-import:/json-import
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - portal_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-portal_user} -d ${DB_NAME:-portal_reports}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Application Server
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: portal_app
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      
      # Database
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-portal_reports}
      DB_USER: ${DB_USER:-portal_user}
      DB_PASSWORD: ${DB_PASSWORD:-secure_db_password}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-jwt_secret_$(openssl rand -hex 32)}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      
      # SMTP (configure with your email provider)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-your-email@gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-your-app-password}
      EMAIL_FROM: ${EMAIL_FROM:-reports@company.com}
      EMAIL_RECIPIENTS: ${EMAIL_RECIPIENTS:-manager@company.com,admin@company.com}
      
      # File Upload
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-jpg,jpeg,png,pdf,doc,docx,xls,xlsx}
      UPLOAD_PATH: ${UPLOAD_PATH:-./uploads}
      
      # Security
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      
      # Features
      ENABLE_REGISTRATION: ${ENABLE_REGISTRATION:-false}
      ENABLE_EMAIL_NOTIFICATIONS: ${ENABLE_EMAIL_NOTIFICATIONS:-true}
      TEXT_FIELD_MAX_LENGTH: ${TEXT_FIELD_MAX_LENGTH:-300}
      
    volumes:
      - uploads_data:/app/uploads
      - exports_data:/app/exports
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - portal_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optional - use with --profile production)
  nginx:
    image: nginx:alpine
    container_name: portal_nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    networks:
      - portal_network
    depends_on:
      - app
    profiles:
      - production

  # JSON Import Helper (Optional - use for importing data)
  json-import:
    image: postgres:15-alpine
    container_name: portal_json_import
    volumes:
      - ./data/json-import:/json-import
      - ./scripts:/scripts
    networks:
      - portal_network
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - import
    command: ["sh", "/scripts/import-json-data.sh"]

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  exports_data:
    driver: local

networks:
  portal_network:
    driver: bridge